<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | O.N.G. LES COLLEGIENS MASTODONTES</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Réinitialisation de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fond dégradé vert forêt comme sur ta photo */
        body {
            background: linear-gradient(135deg, #163a2e 0%, #0b1d17 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Conteneur principal vertical */
        .main-wrapper {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Grille à 3 colonnes pour aligner : Texte Gauche | Logo Centré | Texte Droite */
        .brand-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            gap: 20px;
        }

        /* Style des textes latéraux en jolis petits caractères */
        .side-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.25rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            max-width: 280px;
        }

        .text-left {
            text-align: right;
            justify-self: end;
        }

        .text-right {
            text-align: left;
            justify-self: start;
        }

        /* Zone de l'image du logo */
        .logo-box {
            max-width: 260px; /* Taille parfaite pour laisser de la place aux côtés */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Conteneur des boutons d'aiguillage */
        .buttons-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Style général des boutons arrondis */
        .gate-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* Bouton version Française (Vert opaque) */
        .btn-fr {
            background-color: #2e8b57;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(46, 139, 87, 0.2);
        }

        .btn-fr:hover {
            background-color: #256f45;
            transform: translateY(-2px);
        }

        /* Bouton version Anglaise (Transparent bordure blanche) */
        .btn-en {
            background-color: transparent;
            border-color: #ffffff;
            color: #ffffff;
        }

        .btn-en:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Responsive : Si l'écran est petit, tout s'empile proprement */
        @media (max-width: 768px) {
            .brand-grid {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }
            .side-text {
                text-align: center !important;
                justify-self: center !important;
                font-size: 1.1rem;
            }
            .logo-box {
                order: -1; /* Le logo passe au-dessus sur téléphone */
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="brand-grid">
            
            <div class="side-text text-left">
                Les collegiens sans frontières pour les générations futures
            </div>

            <div class="logo-box">
                <img src="pictures/logo 1.jpeg" alt="Logo ONGD Mastodontes">
            </div>

            <div class="side-text text-right">
                Mastodons without border for future generations
            </div>

        </div>

        <div class="buttons-container">
            <a href="home.html" class="gate-btn btn-fr">
                O.N.G. Les Collegiens Mastodontes (Site FR) <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="en.html" class="gate-btn btn-en">
                <i class="fa-solid fa-globe"></i> O.N.G. Mastodons without border for future generations (website EN) <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

    </div>

</body>
</html>
